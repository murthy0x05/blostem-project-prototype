<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT Minimal Test</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        .control-group { border: 1px solid #333; padding: 15px; border-radius: 5px; flex: 1; }
        button { background: #0e639c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 3px; font-family: monospace; }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; background: #2d2d2d; color: #d4d4d4; border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: monospace; }
        pre { background: #000; padding: 20px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; min-height: 200px; border: 1px solid #333; }
        .status { margin-top: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="controls">
        <!-- Mic Input -->
        <div class="control-group">
            <h3>Audio Input (Mic)</h3>
            <button id="btn-record">🔴 Start Recording</button>
            <button id="btn-stop" disabled>⏹️ Stop & Send</button>
            <div id="recording-status" class="status">Status: Idle</div>
        </div>

        <!-- Text Input -->
        <div class="control-group">
            <h3>Text Input</h3>
            <textarea id="text-input" placeholder="Type text here..."></textarea>
            <button id="btn-text">Send Text</button>
        </div>
    </div>

    <h3>JSON Output</h3>
    <pre id="json-output">// Output will appear here</pre>

    <script>
        const API_URL = 'http://localhost:8000';
        
        const btnRecord = document.getElementById('btn-record');
        const btnStop = document.getElementById('btn-stop');
        const statusDiv = document.getElementById('recording-status');
        
        const textInput = document.getElementById('text-input');
        const btnText = document.getElementById('btn-text');
        
        const outputPre = document.getElementById('json-output');

        let mediaRecorder;
        let audioChunks = [];

        function setOutput(data) {
            outputPre.textContent = JSON.stringify(data, null, 2);
        }

        function setStatus(msg) {
            statusDiv.textContent = `Status: ${msg}`;
        }

        // --- Audio Recording ---
        btnRecord.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(track => track.stop());
                    
                    setStatus('Sending to backend...');
                    outputPre.textContent = '// Processing audio...';
                    
                    const formData = new FormData();
                    formData.append('file', audioBlob, 'mic_recording.webm');

                    try {
                        const response = await fetch(`${API_URL}/stt/transcribe`, { method: 'POST', body: formData });
                        const data = await response.json();
                        setOutput(data);
                        setStatus('Idle');
                    } catch (err) {
                        setOutput({ error: err.message });
                        setStatus('Error');
                    }
                };

                mediaRecorder.start();
                setStatus('Recording...');
                btnRecord.disabled = true;
                btnStop.disabled = false;
            } catch (err) {
                setStatus(`Mic error: ${err.message}`);
            }
        });

        btnStop.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                btnRecord.disabled = false;
                btnStop.disabled = true;
            }
        });

        // --- Text Processing ---
        btnText.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) return;

            outputPre.textContent = '// Processing text...';
            
            try {
                const response = await fetch(`${API_URL}/stt/text`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                setOutput(data);
            } catch (err) {
                setOutput({ error: err.message });
            }
        });
    </script>
</body>
</html>
