<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="RichPerson FD Advisor — Get smart Fixed Deposit suggestions in your language. Speak in Hindi, Telugu, Tamil, Kannada and more. Powered by AI.">
  <title>RichPerson - FD Advisor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
</head>

<body>

  <!-- ============ Top Nav Brand ============ -->
  <nav class="top-nav">
    <a href="/" class="brand-name">
      <img src="assets/logo.svg" alt="RichPerson" class="brand-logo">
      RichPerson
    </a>
    <a href="https://murthy0x05.me/" target="_blank" rel="noopener" class="dev-link">Wanna know who developed this?</a>
  </nav>

  <!-- ============ Main App ============ -->
  <div class="app-container">

    <!-- Voice Interface — Mic First -->
    <section class="voice-section" aria-label="Voice input">
      <div class="mic-container">
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <button class="mic-btn" id="mic-btn" aria-label="Start or stop voice recording">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
      </div>

      <!-- Dynamic Status Text -->
      <div class="status-text" id="status-text">Ask <span class="brand-highlight">RichPerson</span> about Fixed Deposits</div>

      <!-- Waveform Visualizer -->
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </section>

    <!-- Language Selector -->
    <nav class="language-bar" aria-label="Select your language">
      <label>Language:</label>
      <button class="lang-btn active" data-lang="hi-IN">हिन्दी</button>
      <button class="lang-btn" data-lang="en-IN">English</button>
      <button class="lang-btn" data-lang="te-IN">తెలుగు</button>
      <button class="lang-btn" data-lang="ta-IN">தமிழ்</button>
      <button class="lang-btn" data-lang="kn-IN">ಕನ್ನಡ</button>
      <button class="lang-btn" data-lang="ml-IN">മലയാളം</button>
      <button class="lang-btn" data-lang="bn-IN">বাংলা</button>
      <button class="lang-btn" data-lang="mr-IN">मराठी</button>
      <button class="lang-btn" data-lang="gu-IN">ગુજરાતી</button>
    </nav>

    <!-- Transcript Card -->
    <div class="card transcript-card" id="transcript-card">
      <div class="card-header">
        <div class="card-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          </svg>
          Your Question
        </div>
      </div>
      <div class="card-body empty" id="transcript-body">Your speech will appear here...</div>
    </div>

    <!-- Response Card -->
    <div class="card response-card" id="response-card">
      <div class="card-header">
        <div class="card-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="16" x2="12" y2="12" />
            <line x1="12" y1="8" x2="12.01" y2="8" />
          </svg>
          FD Suggestion
        </div>
        <button class="play-btn" id="play-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          Listen
        </button>
      </div>
      <div class="card-body empty" id="response-body">FD suggestions will appear here...</div>
    </div>

    <!-- Conversation History -->
    <section class="history-section hidden" id="history-section">
      <div class="history-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
        </svg>
        Conversation History
      </div>
      <div class="history-list" id="history-list"></div>
    </section>



    <!-- Footer -->
    <footer class="app-footer">
      <p>RichPerson FD Advisor • Powered by Gemini AI • Not financial advice — verify rates with your bank</p>
    </footer>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
